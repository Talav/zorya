site_name: Zorya
site_description: A Go HTTP API framework for building type-safe REST APIs
site_url: https://zorya.rocks/
repo_name: talav/zorya
repo_url: https://github.com/talav/zorya

theme:
  name: material

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
      primary: indigo
      accent: indigo

    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: indigo
      accent: indigo

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
      primary: indigo
      accent: indigo

  features:
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.code.annotate

  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Tutorial:
      - Quick Start: tutorial/quick-start.md
  - Guides:
      - Router Adapters: guides/router-adapters.md
      - Defining Inputs: guides/inputs.md
      - Defining Outputs: guides/outputs.md
      - Validation: guides/validation.md
      - Error Handling: guides/errors.md
      - Route Groups: guides/groups.md
      - Middleware: guides/middleware.md
      - Security: guides/security.md
      - OpenAPI & Docs UI: guides/openapi.md
      - Conditional Requests: guides/conditional.md
      - Streaming (SSE): guides/streaming.md
      - File Uploads: guides/uploads.md
      - Content Negotiation: guides/content-negotiation.md
  - Reference:
      - Config Options: reference/config.md
      - Struct Tag Cheatsheet: reference/tags.md
      - Error Helpers: reference/errors.md
  - Examples: examples/index.md

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

markdown_extensions:
  # Python Markdown extensions
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section

  # PyMdown Extensions
  - pymdownx.arithmatex
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/talav/zorya
    - icon: fontawesome/brands/golang
      link: https://pkg.go.dev/github.com/talav/zorya

copyright: Copyright &copy; 2026 Talav
